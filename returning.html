<!DOCTYPE html>
<html>
<head>
    <title>Return Products</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        const productList = [
            { id: 1, name: "Chairs" },
            { id: 2, name: "Tents" },
            { id: 3, name: "Tables" },
            { id: 4, name: "Lamps" },
            { id: 5, name: "Flowers" }
        ];

        function toggleQuantity(productId) {
            const wrapper = document.getElementById(`product-wrapper-${productId}`);
            const checked = document.getElementById(`check-${productId}`).checked;

            if (checked) {
                const input = document.createElement("input");
                input.type = "number";
                input.name = "quantities[]";
                input.placeholder = "Quantity Returned";
                input.required = true;
                input.id = `qty-${productId}`;

                const hidden = document.createElement("input");
                hidden.type = "hidden";
                hidden.name = "products[]";
                hidden.value = productId;
                hidden.id = `hidden-${productId}`;

                wrapper.appendChild(hidden);
                wrapper.appendChild(input);
            } else {
                const qtyInput = document.getElementById(`qty-${productId}`);
                const hiddenInput = document.getElementById(`hidden-${productId}`);
                if (qtyInput) qtyInput.remove();
                if (hiddenInput) hiddenInput.remove();
            }
        }

        function validateForm() {
            const checkedBoxes = document.querySelectorAll("input[type='checkbox']:checked");
            if (checkedBoxes.length === 0) {
                alert("Please select at least one product.");
                return false;
            }

            const quantities = document.querySelectorAll("input[name='quantities[]']");
            for (let input of quantities) {
                if (input.value.trim() === "" || parseInt(input.value) <= 0) {
                    alert("Please enter a valid quantity for each selected product.");
                    return false;
                }
            }

            return true;
        }
    </script>
</head>
<body>
<div class="page-container">    
<form action="returning.php" method="POST" onsubmit="return validateForm()">
    <h2>Return Products</h2>

    <div>
        <script>
            document.write('<div id="products-list">');
            productList.forEach(p => {
                document.write(`
                    <div id="product-wrapper-${p.id}">
                        <label>
                            <input type="checkbox" id="check-${p.id}" onchange="toggleQuantity(${p.id})">
                            ${p.name}
                        </label>
                    </div>
                `);
            });
            document.write('</div>');
        </script>
    </div>

    <br>

    <label for="return_date">Return Date:</label>
    <input type="date" name="return_date" id="return_date" required>

    <br><br>

    <label for="notes">Additional Notes (optional):</label><br>
    <textarea name="notes" id="notes" rows="4" cols="50" placeholder="Enter any special instructions..."></textarea>

    <br><br>
    <button type="submit">Confirm Return</button>
</form>
</div>
</body>
<footer style="text-align:center; padding:15px; background:#1868b3; color:#fff; border-radius: 0 0 12px 12px; margin-top: 30px;">
  &copy; DecoRwanda 2025
</footer>

</html>
