<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/validate.js" defer></script>


</head>
<body>
<div class="page-container">
<form action="register.php" method="POST" onsubmit="return validateForm()" novalidate>


    <h2>Register</h2>
   <input type="text" id="name" name="name" placeholder="Full Name" required>
<input type="text" id="personal_id" name="personal_id" placeholder="Personal ID" required>
<input type="text" id="phone" name="phone" placeholder="phone" required>
<input type="text" id="workplace" name="workplace" placeholder="Workplace" required>
<input type="email" id="email" name="email" placeholder="Email" required>
<input type="password" id="password" name="password" placeholder="Password" required>


    <button type="submit">Register</button>
</form>
</div>
</body>
